# An action to perform enablement on github actions workflows. According to github,
# repository actions can be suspended if the repository is inactive for 60 days.

# Requires
# gh-workflow-keepalive@v1.2.1              Github Marketplace Action

name: Scheduled Workflow Keepalive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 2-30/2 * *'

permissions:
  actions: write

jobs:

  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: liskin/gh-workflow-keepalive@v1.2.1
